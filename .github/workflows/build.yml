name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Multi-platform Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: UniversitalyScraper-Windows.exe
            use_pyinstaller: pyinstaller --noconsole --onefile --icon=app_icon.ico --name=UniversitalyScraper scraper_gui.py
          - os: ubuntu-latest
            asset_name: UniversitalyScraper-Linux
            use_pyinstaller: pyinstaller --noconsole --onefile --name=UniversitalyScraper scraper_gui.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests pyinstaller Pillow

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Build with PyInstaller
        run: ${{ matrix.use_pyinstaller }}

      - name: Locate output binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dir dist
          move dist\UniversitalyScraper.exe .\UniversitalyScraper-Windows.exe

      - name: Locate output binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ls -l dist
          mv dist/UniversitalyScraper ./UniversitalyScraper-Linux
          chmod +x ./UniversitalyScraper-Linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: UniversitalyScraper-Windows.exe
          merge-multiple: true
          path: ./

      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: UniversitalyScraper-Linux
          merge-multiple: true
          path: ./

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            UniversitalyScraper-Windows.exe
            UniversitalyScraper-Linux
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
